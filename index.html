<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>SetFlow</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #181818;
      border-radius: 14px;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 30px;
    }

    .btn {
      border: none;
      background: #1db954;
      color: black;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 15px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      border: 1px solid #444;
      background: #222;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-secondary.active {
      background: #1db954;
      color: black;
      border-color: #1db954;
      font-weight: bold;
    }

    .hidden {
      display: none !important;
    }

    .mode-row {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 25px;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #1db954;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #222;
      color: white;
    }

    .toolbar {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .toolbar input {
      flex: 1;
      min-width: 250px;
    }

    .band-grid {
      display: grid;
      grid-template-columns:
        repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      max-height: 500px;
      overflow-y: auto;
      background: #101010;
      padding: 15px;
      border-radius: 12px;
    }

    .band-card {
      background: #1d1d1d;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 15px;
    }

    .band-card.selected {
      border-color: #1db954;
    }

    .card-top {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .card-top input {
      width: auto;
    }

    .custom-box {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .status {
      margin-top: 25px;
      padding: 15px;
      background: #202020;
      border-radius: 10px;
      text-align: center;
      line-height: 1.6;
    }

    a {
      color: #1db954;
    }

    @media (max-width: 600px) {
  /* Trim the massive outer desktop padding so the app doesn't choke on small screens */
  body {
    padding: 15px 10px;
  }
  
  .container {
    padding: 15px;
  }

  /* 🛠️ FIX FOR PLAYLIST NAME & DESCRIPTION: Force them to stack vertically */
  .meta-row {
    grid-template-columns: 1fr !important;
    gap: 15px; /* Adds a clean gap between the two stacked inputs */
  }

  /* Force the grid to stay locked within the screen width while keeping your exact card look */
  .band-grid {
    grid-template-columns: 1fr; /* Lines cards up perfectly in a single column layout */
    padding: 10px;
  }
}

    .options-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn-secondary.new-releases-active {
      background: #1ed760;
      color: black;
      border-color: #1ed760;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🎸 SetFlow</h1>

  <p class="subtitle">
    Build festival and tour playlists automatically.
  </p>

  <div id="auth-view">
    <div style="text-align:center">
      <button
        id="login-btn"
        class="btn"
      >
        Connect Spotify
      </button>
    </div>
  </div>

  <div
    id="app-view"
    class="hidden"
  >

    <div
      id="welcome-msg"
      style="
        color:#1db954;
        margin-bottom:20px;
        font-weight:bold;
      "
    >
      Connected
    </div>

    <div class="mode-row">

      <button
        id="festival-btn"
        class="btn-secondary active"
      >
        Festival Mode
      </button>

      <button
        id="tour-btn"
        class="btn-secondary"
      >
        Tour Mode
      </button>

    </div>

    <div class="meta-row">

      <div>
        <label>
          Playlist Name
        </label>

        <input
          id="playlist-name"
          value="Festival Lineup Tape"
        >
      </div>

      <div>
        <label>
          Playlist Description
        </label>

        <input
          id="playlist-desc"
          value="Generated by SetFlow"
        >
      </div>

    </div>

    <div class="toolbar">

      <input
        id="catalog-search"
        placeholder="Search bands..."
      >

      <button
        id="select-all"
        class="btn-secondary"
      >
        All
      </button>

      <button
        id="clear-all"
        class="btn-secondary"
      >
        None
      </button>

    </div>

    <div
      id="band-grid"
      class="band-grid"
    >
    </div>

    <div class="custom-box">

      <input
        id="new-band"
        placeholder="Add a missing band..."
      >

      <button
        id="add-band"
        class="btn-secondary"
      >
        Add
      </button>

    </div>

    <div class="options-row">

      <button
        id="new-releases-btn"
        class="btn-secondary"
        title="Adds the latest release for each selected band"
      >
        ✦ Include New Releases
      </button>

      <select id="sort-order" style="padding:10px 14px;border-radius:8px;border:1px solid #444;background:#222;color:white;font-size:14px;cursor:pointer;">
        <option value="as-selected">Order: As Selected</option>
        <option value="name-asc">Order: Name A→Z</option>
        <option value="name-desc">Order: Name Z→A</option>
        <option value="songs-asc">Order: Fewest Songs First</option>
        <option value="songs-desc">Order: Most Songs First</option>
      </select>

    </div>

        <button
      id="generate-btn"
      class="btn"
      style="
        width:100%;
        margin-top:25px;
      "
    >
      Generate Playlist
    </button>

  </div>

  <div
    id="status"
    class="status"
  >
    Waiting...
  </div>

</div>

<script src="config.js"></script>
<script src="script-part1.js"></script>
<script src="script-part2.js"></script>

</body>
</html>
